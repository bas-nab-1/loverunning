<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Running</title>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">


    <!-- meta tags  -->
    <meta name="description"
        content="Love Runnings, club for runners in Dublin, Ireland, 
                 Urban running, Trail running, Dublin Docklands, Phoenix park">
    <meta name="keywords" content="Love Running, run, runners, Ireland, Dublin, sport, exercise">

    <link rel="stylesheet" href="assets/css/style.css">




<body>
    <!-- Header-->
    <header>
        <a href="index.html">
            <h1 id="logo">Love Running</h1>
        </a>
        <input type="checkbox" id="nav-toggle" name="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label"><i class="fa-solid fa-bars"></i></label>
        <nav>
            <ul id="menu">
                <li><a href="index.html" >Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="signup.html"class="active">Sign Up</a></li>

            </ul>
        </nav>
    </header>

       <!-- Main content -->
    <main>
        <section id="signup">
            <form id="signup-form" method="POST" action="https://formdump.codeinstitute.net">
                <h2><i class="fa-solid fa-heartbeat"></i> Let's get you signed up!</h2>
                <label for="first-name">First Name</label>
                <input type="text" name="first_name" id="first-name" class="text-input" required>
                <br>
                <label for="last-name">Last Name</label>
                <input type="text" name="last_name" id="last-name" class="text-input" required>
                <br>
                <label for="email-address">Email Address</label>
                <input type="email" name="email_address" id="email-address" class="text-input" required>
                <br>
                <div class="radio-buttons">
                    <div>
                        <label for="road">Road</label>
                        <input type="radio" name="running_preference" id="road" value="road" required checked>
                    </div>
                    <div>
                        <label for="trail">Trail</label>
                        <input type="radio" name="running_preference" id="trail" value="trail" required>
                    </div>
                    <div>
                        <label for="both">Both</label>
                        <input type="radio" name="running_preference" id="both" value="both" required>
                    </div>
                </div>
                <button type="submit" class="join-button">Let's Run!</button>
            </form>
        </section>
    </main>
    </main>

    <!--Footer-->
    <footer>
        <ul id="social-networks">
            <li>
                <a href="https://www.facebook.com" target="_blank" rel="noopener"
                aria-label="Visit our Facebook page (Open in a new tab)">
                  <i class="fa-brands fa-facebook"></i></a>
            </li>
            <li>
                <a href="https://www.twitter.com" target="_blank" rel="noopener"
                aria-label="Visit our Twitter page (Open in a new tab)">
                  <i class="fa-brands fa-twitter"></i></a>
            </li>
            <li>
                <a href="https://www.youtube.com" target="_blank" rel="noopener"
                aria-label="Visit our YouTube page (Open in a new tab)">
                  <i class="fa-brands fa-youtube"></i></a>
            </li>
            <li>
                <a href="https://www.instagram.com" target="_blank" rel="noopener"
                aria-label="Visit our Instagram page (Open in a new tab)">
                  <i class="fa-brands fa-instagram"></i></a>
            </li>
        </ul>
    </footer>


<!-- Font Awesome Kit -->
    <script src="https://kit.fontawesome.com/7709c2b732.js" crossorigin="anonymous"></script>

</body>

</html>
